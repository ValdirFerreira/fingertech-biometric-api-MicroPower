<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Leitoras</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="assets/libs/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="assets/libs/font-awesome/css/font-awesome.min.css" />
    <link rel="stylesheet" href="assets/css/app.css">
    <link rel="stylesheet" href="assets/css/navbar.css">
    <link rel="stylesheet" type="text/css" href="assets/libs/toastr.css">

</head>

<body ng-app="readerConfigApp" class="page-header-fixed page-sidebar-closed-hide-logo page-container-bg-solid">
    <div id="spinner" ng-spinner-bar class="spinner-bar">
        <div id="biometric-suprema-capturing" class="hide"></div>
        <div id="biometric-suprema-capturing-message" class="hide">
            <span>{{'SUPREMA_MESSAGE' | translate}}</span>
        </div>
        <div class="spinner-icon">
            <i class="fa fa-spinner fa-spin fa-5x"></i>
        </div>
    </div>
    <div ui-view></div>
    <script src="assets/libs/jquery.js"></script>
    <script src="assets/libs/angular.js"></script>
    <script src="assets/libs/angular-ui-router.js"></script>
    <script src="assets/libs/ui-bootstrap-tpls.js"></script>
    <script src="assets/libs/angular-translate.js"></script>
    <script src="assets/libs/bootstrap.js"></script>
    <script src="assets/libs/toastr.min.js"></script>
    <script src="app/modules/dashboard/controller/DashboardCtrl.js"></script>
    <script src="app/modules/biometricReader/controller/biometricReaderController.js"></script>
    <script src="app/modules/services/RestSvc.js"></script>
    <script src="app/modules/services/toastrSvc.js"></script>
    <script src="app/modules/services/manufacturerBiometricsEnums.js"></script>
    <script src="assets/translate/pt.json"></script>
    <script src="shared/directive/spinnerBarDirective.js"></script>
    <script src="app/app.js"></script>
    <script>
        try {
            (function (i, s, o, g, r, a, m) {
                i['GoogleAnalyticsObject'] = r; i[r] = i[r] || function () {
                    (i[r].q = i[r].q || []).push(arguments)
                }, i[r].l = 1 * new Date(); a = s.createElement(o),
                    m = s.getElementsByTagName(o)[0]; a.async = 1; a.src = g; m.parentNode.insertBefore(a, m)
            })(window, document, 'script', 'https://www.google-analytics.com/analytics.js', 'ga');

            ga('create', 'UA-157501337-5', {
                siteSpeedSampleRate: 100
            });

            window.sendSamReaderEvent = (eventLocation, error) => {
                ga('send', {
                    hitType: 'event',
                    eventCategory: `SAM Readers - Captura Biométrica`,
                    eventAction: eventLocation,
                    eventLabel: error ? error : 'Sucesso'
                });
            }
        } catch (err) {
            console.log(err);
        }
    </script>
</body>

</html>
